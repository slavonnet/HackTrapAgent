listen = *
protocols = pop3

disable_plaintext_auth = no
auth_mechanisms = plain login

mail_home = /var/mail/%n
mail_location = maildir:~/Maildir

passdb {
  driver = passwd-file
  args = /run/hacktrap/dovecot.passwd
}

userdb {
  driver = passwd-file
  args = username_format=%n /run/hacktrap/dovecot.passwd
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
}

ssl = no

log_path = /var/log/pop3/dovecot.log
info_log_path = /var/log/pop3/dovecot.log
auth_verbose = yes
