[Definition]
# Match repeated NFSv4 RPC probes emitted by nfs-ganesha debug logs.
# Function 0 (NULL ping) and Function 1 (COMPOUND/SETCLIENTID flow) are both
# used by common NFS client probing sequences and should contribute to bans.
failregex = ^.*nfs_rpc_process_request\s+:DISP\s+:DEBUG\s+:Request from (?:::ffff:)?<HOST> for Program 100003,\s+Version 4,\s+Function [01] has xid=\d+$
ignoreregex =
