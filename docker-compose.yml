name: hacktrapagent

services:
  ssh:
    profiles:
      - ssh
    build:
      context: .
      dockerfile: build/ssh/Dockerfile
    environment:
      HACKTRAP_USER: ${SSH_RUNTIME_USER:-trap}
    ports:
      - "${SSH_PUBLIC_PORT:-2222}:22"
    volumes:
      - ssh_logs:/var/log/ssh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  telnetd:
    profiles:
      - telnetd
    build:
      context: .
      dockerfile: build/telnetd/Dockerfile
    environment:
      HACKTRAP_USER: ${TELNETD_RUNTIME_USER:-trap}
    ports:
      - "${TELNETD_PUBLIC_PORT:-2323}:23"
    volumes:
      - telnetd_logs:/var/log/telnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -lc ': >/dev/tcp/127.0.0.1/23'"]
      interval: 5s
      timeout: 3s
      retries: 10

  ftp:
    profiles:
      - ftp
    build:
      context: .
      dockerfile: build/ftp/Dockerfile
    environment:
      HACKTRAP_USER: ${FTP_RUNTIME_USER:-trap}
    ports:
      - "${FTP_PUBLIC_PORT:-2121}:21"
    volumes:
      - ftp_logs:/var/log/ftp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x vsftpd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  ntp:
    profiles:
      - ntp
    build:
      context: .
      dockerfile: build/ntp/Dockerfile
    environment:
      NTP_LOG_FILE: /var/log/ntp/ntp.log
      NTP_DEBUG_LEVEL: 3
    ports:
      - "${NTP_PUBLIC_PORT:-2123}:123/udp"
    volumes:
      - ntp_logs:/var/log/ntp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x ntpd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  nfs:
    profiles:
      - nfs
    build:
      context: .
      dockerfile: build/nfs/Dockerfile
    environment:
      NFS_ALLOWED_CLIENTS: ${NFS_ALLOWED_CLIENTS:-127.0.0.1/32}
      NFS_LOG_LEVEL: ${NFS_LOG_LEVEL:-DEBUG}
    ports:
      - "${NFS_PUBLIC_PORT:-2049}:2049"
    volumes:
      - nfs_logs:/var/log/nfs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f ganesha.nfsd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  l2tp:
    profiles:
      - l2tp
    build:
      context: .
      dockerfile: build/l2tp/Dockerfile
    environment:
      HACKTRAP_USER: ${L2TP_RUNTIME_USER:-trap}
    ports:
      - "${L2TP_PUBLIC_PORT:-11701}:1701/udp"
      - "${L2TP_IKE_PUBLIC_PORT:-15100}:500/udp"
      - "${L2TP_NATT_PUBLIC_PORT:-14501}:4500/udp"
    cap_add:
      - NET_ADMIN
    volumes:
      - l2tp_logs:/var/log/l2tp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x charon >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgresql:
    profiles:
      - postgresql
    build:
      context: .
      dockerfile: build/postgresql/Dockerfile
    environment:
      HACKTRAP_USER: ${POSTGRESQL_RUNTIME_USER:-trap}
    ports:
      - "${POSTGRESQL_PUBLIC_PORT:-5432}:5432"
    volumes:
      - postgresql_logs:/var/log/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "runuser -u postgres -- pg_isready -h /var/run/postgresql -U postgres >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  ike2:
    profiles:
      - ike2
    build:
      context: .
      dockerfile: build/ike2/Dockerfile
    environment:
      HACKTRAP_USER: ${IKE2_RUNTIME_USER:-trap}
    ports:
      - "${IKE2_PUBLIC_PORT:-1500}:500/udp"
      - "${IKE2_NATT_PUBLIC_PORT:-14500}:4500/udp"
    cap_add:
      - NET_ADMIN
    volumes:
      - ike2_logs:/var/log/ike2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x charon >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    profiles:
      - mysql
    build:
      context: .
      dockerfile: build/mysql/Dockerfile
    environment:
      HACKTRAP_USER: ${MYSQL_RUNTIME_USER:-trap}
    ports:
      - "${MYSQL_PUBLIC_PORT:-3306}:3306"
    volumes:
      - mysql_logs:/var/log/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x mariadbd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  memcached:
    profiles:
      - memcached
    build:
      context: .
      dockerfile: build/memcached/Dockerfile
    environment:
      HACKTRAP_USER: ${MEMCACHED_RUNTIME_USER:-trap}
    ports:
      - "${MEMCACHED_PUBLIC_PORT:-2112}:11211"
    volumes:
      - memcached_logs:/var/log/memcached
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('127.0.0.1', 11211), 2); s.sendall(b'auth invalid invalid\\r\\n'); s.recv(64); s.close()\""]

  mongodb:
    profiles:
      - mongodb
    build:
      context: .
      dockerfile: build/mongodb/Dockerfile
    environment:
      HACKTRAP_USER: ${MONGODB_RUNTIME_USER:-trap}
    ports:
      - "${MONGODB_PUBLIC_PORT:-27017}:27017"
    volumes:
      - mongodb_logs:/var/log/mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x mongod >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    profiles:
      - redis
    build:
      context: .
      dockerfile: build/redis/Dockerfile
    environment:
      HACKTRAP_USER: ${REDIS_RUNTIME_USER:-trap}
    ports:
      - "${REDIS_PUBLIC_PORT:-6379}:6379"
    volumes:
      - redis_logs:/var/log/redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 --no-auth-warning PING | grep -Eq 'PONG|NOAUTH'"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticsearch:
    profiles:
      - elasticsearch
    build:
      context: .
      dockerfile: build/elasticsearch/Dockerfile
    environment:
      HACKTRAP_USER: ${ELASTICSEARCH_RUNTIME_USER:-trap}
    ports:
      - "${ELASTICSEARCH_PUBLIC_PORT:-9200}:9200"
    volumes:
      - elasticsearch_logs:/var/log/elasticsearch
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('127.0.0.1', 9200), 2); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    profiles:
      - clickhouse
    build:
      context: .
      dockerfile: build/clickhouse/Dockerfile
    environment:
      HACKTRAP_USER: ${CLICKHOUSE_RUNTIME_USER:-trap}
    ports:
      - "${CLICKHOUSE_HTTP_PUBLIC_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PUBLIC_PORT:-9000}:9000"
    volumes:
      - clickhouse_logs:/var/log/clickhouse-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x clickhouse-server >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  bgp:
    profiles:
      - bgp
    build:
      context: .
      dockerfile: build/bgp/Dockerfile
    environment:
      BGP_ALLOWED_PEERS: ${BGP_ALLOWED_PEERS:-}
      BGP_LOCAL_ASN: ${BGP_LOCAL_ASN:-65000}
      BGP_PEER_ASN: ${BGP_PEER_ASN:-65001}
      BGP_ROUTER_ID: ${BGP_ROUTER_ID:-198.51.100.1}
    ports:
      - "${BGP_PUBLIC_PORT:-2179}:179"
    volumes:
      - bgp_logs:/var/log/bgp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn sport = :179 | grep -q ':179'"]
      interval: 5s
      timeout: 3s
      retries: 10

  openvpn:
    profiles:
      - openvpn
    build:
      context: .
      dockerfile: build/openvpn/Dockerfile
    environment:
      HACKTRAP_USER: ${OPENVPN_RUNTIME_USER:-trap}
    ports:
      - "${OPENVPN_PUBLIC_PORT:-1194}:1194/udp"
    volumes:
      - openvpn_logs:/var/log/openvpn
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ss -lun | grep -q ':1194'"]
      interval: 5s
      timeout: 3s
      retries: 10

  snmp:
    profiles:
      - snmp
    build:
      context: .
      dockerfile: build/snmp/Dockerfile
    environment:
      HACKTRAP_USER: ${SNMP_RUNTIME_USER:-trap}
    ports:
      - "${SNMP_PUBLIC_PORT:-2161}:161/udp"
    volumes:
      - snmp_logs:/var/log/snmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x snmpd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  rdp:
    profiles:
      - rdp
    build:
      context: .
      dockerfile: build/rdp/Dockerfile
    environment:
      HACKTRAP_USER: ${RDP_RUNTIME_USER:-trap}
    ports:
      - "${RDP_PUBLIC_PORT:-3389}:3389"
    volumes:
      - rdp_logs:/var/log/rdp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x xrdp >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  snmptrap:
    profiles:
      - snmptrap
    build:
      context: .
      dockerfile: build/snmptrap/Dockerfile
    environment:
      HACKTRAP_USER: ${SNMPTRAP_RUNTIME_USER:-trap}
    ports:
      - "${SNMPTRAP_PUBLIC_PORT:-2162}:162/udp"
    volumes:
      - snmptrap_logs:/var/log/snmptrap
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x snmptrapd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    profiles:
      - rabbitmq
    build:
      context: .
      dockerfile: build/rabbitmq/Dockerfile
    environment:
      HACKTRAP_USER: ${RABBITMQ_RUNTIME_USER:-trap}
      RABBITMQ_LOGS: /var/log/rabbitmq/rabbit.log
    ports:
      - "${RABBITMQ_PUBLIC_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PUBLIC_PORT:-15672}:15672"
    volumes:
      - rabbitmq_logs:/var/log/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  radius:
    profiles:
      - radius
    build:
      context: .
      dockerfile: build/radius/Dockerfile
    environment:
      HACKTRAP_USER: ${RADIUS_RUNTIME_USER:-trap}
    ports:
      - "${RADIUS_PUBLIC_PORT:-1812}:1812/udp"
    volumes:
      - radius_logs:/var/log/radius
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x freeradius >/dev/null || pgrep -x radiusd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  ad:
    profiles:
      - ad
    build:
      context: .
      dockerfile: build/ad/Dockerfile
    environment:
      HACKTRAP_USER: ${AD_RUNTIME_USER:-trap}
    ports:
      - "${AD_PUBLIC_PORT:-2389}:389"
    volumes:
      - ad_logs:/var/log/ad
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pidof slapd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  fail2ban:
    build:
      context: .
      dockerfile: build/fail2ban/Dockerfile
    environment:
      FAIL2BAN_SERVICES: ${FAIL2BAN_SERVICES:-ssh,telnetd,ftp,ntp,nfs,postgresql,mysql,memcached,mongodb,redis,bgp,openvpn,l2tp,ike2,imap,pop3,smtp,elasticsearch,clickhouse,ad,radius,rabbitmq,rdp,snmp,snmptrap}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ssh_logs:/var/log/ssh
      - telnetd_logs:/var/log/telnet
      - ftp_logs:/var/log/ftp
      - ntp_logs:/var/log/ntp
      - nfs_logs:/var/log/nfs
      - imap_logs:/var/log/imap
      - pop3_logs:/var/log/pop3
      - smtp_logs:/var/log/smtp
      - l2tp_logs:/var/log/l2tp
      - ike2_logs:/var/log/ike2
      - postgresql_logs:/var/log/postgresql
      - mysql_logs:/var/log/mysql
      - memcached_logs:/var/log/memcached
      - mongodb_logs:/var/log/mongodb
      - redis_logs:/var/log/redis
      - elasticsearch_logs:/var/log/elasticsearch
      - clickhouse_logs:/var/log/clickhouse-server
      - bgp_logs:/var/log/bgp
      - openvpn_logs:/var/log/openvpn
      - snmp_logs:/var/log/snmp
      - snmptrap_logs:/var/log/snmptrap
      - rdp_logs:/var/log/rdp
      - rabbitmq_logs:/var/log/rabbitmq
      - radius_logs:/var/log/radius
      - ad_logs:/var/log/ad
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "fail2ban-client ping | grep -q 'Server replied'"]
      interval: 5s
      timeout: 3s
      retries: 10

  attacker:
    build:
      context: .
      dockerfile: build/attacker/Dockerfile
    command: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    profiles:
      - test

  imap:
    profiles:
      - imap
    build:
      context: .
      dockerfile: build/imap/Dockerfile
    environment:
      HACKTRAP_USER: ${IMAP_RUNTIME_USER:-trap}
    ports:
      - "${IMAP_PUBLIC_PORT:-2143}:143"
    volumes:
      - imap_logs:/var/log/imap
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x dovecot >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  pop3:
    profiles:
      - pop3
    build:
      context: .
      dockerfile: build/pop3/Dockerfile
    environment:
      HACKTRAP_USER: ${POP3_RUNTIME_USER:-trap}
    ports:
      - "${POP3_PUBLIC_PORT:-2110}:110"
    volumes:
      - pop3_logs:/var/log/pop3
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x dovecot >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  smtp:
    profiles:
      - smtp
    build:
      context: .
      dockerfile: build/smtp/Dockerfile
    environment:
      HACKTRAP_USER: ${SMTP_RUNTIME_USER:-trap}
    ports:
      - "${SMTP_PUBLIC_PORT:-2525}:25"
    volumes:
      - smtp_logs:/var/log/smtp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x master >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ssh_logs:
  telnetd_logs:
  ftp_logs:
  ntp_logs:
  nfs_logs:
  imap_logs:
  pop3_logs:
  smtp_logs:
  l2tp_logs:
  ike2_logs:
  postgresql_logs:
  mysql_logs:
  memcached_logs:
  mongodb_logs:
  redis_logs:
  elasticsearch_logs:
  clickhouse_logs:
  bgp_logs:
  openvpn_logs:
  snmp_logs:
  snmptrap_logs:
  rdp_logs:
  rabbitmq_logs:
  radius_logs:
  ad_logs:
