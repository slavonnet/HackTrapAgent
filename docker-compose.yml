name: hacktrapagent

services:
  ssh:
    profiles:
      - ssh
    build:
      context: .
      dockerfile: build/ssh/Dockerfile
    environment:
      HACKTRAP_USER: ${SSH_RUNTIME_USER:-trap}
    ports:
      - "${SSH_PUBLIC_PORT:-2222}:22"
    volumes:
      - ssh_logs:/var/log/ssh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  ftp:
    profiles:
      - ftp
    build:
      context: .
      dockerfile: build/ftp/Dockerfile
    environment:
      HACKTRAP_USER: ${FTP_RUNTIME_USER:-trap}
    ports:
      - "${FTP_PUBLIC_PORT:-2121}:21"
    volumes:
      - ftp_logs:/var/log/ftp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x vsftpd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  l2tp:
    profiles:
      - l2tp
    build:
      context: .
      dockerfile: build/l2tp/Dockerfile
    environment:
      HACKTRAP_USER: ${L2TP_RUNTIME_USER:-trap}
    ports:
      - "${L2TP_PUBLIC_PORT:-11701}:1701/udp"
      - "${L2TP_IKE_PUBLIC_PORT:-15100}:500/udp"
      - "${L2TP_NATT_PUBLIC_PORT:-14501}:4500/udp"
    cap_add:
      - NET_ADMIN
    volumes:
      - l2tp_logs:/var/log/l2tp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x charon >/dev/null && pgrep -x xl2tpd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  ike2:
    profiles:
      - ike2
    build:
      context: .
      dockerfile: build/ike2/Dockerfile
    environment:
      HACKTRAP_USER: ${IKE2_RUNTIME_USER:-trap}
    ports:
      - "${IKE2_PUBLIC_PORT:-1500}:500/udp"
      - "${IKE2_NATT_PUBLIC_PORT:-14500}:4500/udp"
    cap_add:
      - NET_ADMIN
    volumes:
      - ike2_logs:/var/log/ike2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x charon >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  bgp:
    profiles:
      - bgp
    build:
      context: .
      dockerfile: build/bgp/Dockerfile
    environment:
      BGP_ALLOWED_PEERS: ${BGP_ALLOWED_PEERS:-}
    ports:
      - "${BGP_PUBLIC_PORT:-2179}:179"
    volumes:
      - bgp_logs:/var/log/bgp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('127.0.0.1', 179), 2); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 10

  openvpn:
    profiles:
      - openvpn
    build:
      context: .
      dockerfile: build/openvpn/Dockerfile
    environment:
      HACKTRAP_USER: ${OPENVPN_RUNTIME_USER:-trap}
    ports:
      - "${OPENVPN_PUBLIC_PORT:-1194}:1194/udp"
    volumes:
      - openvpn_logs:/var/log/openvpn
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ss -lun | grep -q ':1194'"]
      interval: 5s
      timeout: 3s
      retries: 10

  fail2ban:
    build:
      context: .
      dockerfile: build/fail2ban/Dockerfile
    environment:
      FAIL2BAN_SERVICES: ${FAIL2BAN_SERVICES:-ssh}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ssh_logs:/var/log/ssh
      - ftp_logs:/var/log/ftp
      - l2tp_logs:/var/log/l2tp
      - ike2_logs:/var/log/ike2
      - bgp_logs:/var/log/bgp
      - openvpn_logs:/var/log/openvpn
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "fail2ban-client ping | grep -q 'Server replied'"]
      interval: 5s
      timeout: 3s
      retries: 10

  attacker:
    build:
      context: .
      dockerfile: build/attacker/Dockerfile
    command: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    profiles:
      - test

volumes:
  ssh_logs:
  ftp_logs:
  l2tp_logs:
  ike2_logs:
  bgp_logs:
  openvpn_logs:
