name: hacktrapagent

services:
  ssh:
    profiles:
      - ssh
    build:
      context: .
      dockerfile: build/ssh/Dockerfile
    environment:
      HACKTRAP_USER: ${SSH_RUNTIME_USER:-trap}
    ports:
      - "${SSH_PUBLIC_PORT:-2222}:22"
    volumes:
      - ssh_logs:/var/log/ssh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  ftp:
    profiles:
      - ftp
    build:
      context: .
      dockerfile: build/ftp/Dockerfile
    environment:
      HACKTRAP_USER: ${FTP_RUNTIME_USER:-trap}
    ports:
      - "${FTP_PUBLIC_PORT:-2121}:21"
    volumes:
      - ftp_logs:/var/log/ftp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x vsftpd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  ntp:
    profiles:
      - ntp
    build:
      context: .
      dockerfile: build/ntp/Dockerfile
    environment:
      NTP_LISTEN_PORT: 123
      NTP_LOG_FILE: /var/log/ntp/ntp.log
    ports:
      - "${NTP_PUBLIC_PORT:-2123}:123/udp"
    volumes:
      - ntp_logs:/var/log/ntp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f ntp-honeypot.py >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  openvpn:
    profiles:
      - openvpn
    build:
      context: .
      dockerfile: build/openvpn/Dockerfile
    environment:
      HACKTRAP_USER: ${OPENVPN_RUNTIME_USER:-trap}
    ports:
      - "${OPENVPN_PUBLIC_PORT:-1194}:1194/udp"
    volumes:
      - openvpn_logs:/var/log/openvpn
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ss -lun | grep -q ':1194'"]
      interval: 5s
      timeout: 3s
      retries: 10

  fail2ban:
    build:
      context: .
      dockerfile: build/fail2ban/Dockerfile
    environment:
      FAIL2BAN_SERVICES: ${FAIL2BAN_SERVICES:-ssh}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ssh_logs:/var/log/ssh
      - ftp_logs:/var/log/ftp
      - ntp_logs:/var/log/ntp
      - openvpn_logs:/var/log/openvpn
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "fail2ban-client ping | grep -q 'Server replied'"]
      interval: 5s
      timeout: 3s
      retries: 10

  attacker:
    build:
      context: .
      dockerfile: build/attacker/Dockerfile
    command: ["sleep", "infinity"]
    profiles:
      - test

volumes:
  ssh_logs:
  ftp_logs:
  ntp_logs:
  openvpn_logs:
