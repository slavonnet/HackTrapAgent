name: hacktrapagent

services:
  ssh:
    profiles:
      - ssh
    build:
      context: .
      dockerfile: build/ssh/Dockerfile
    environment:
      HACKTRAP_USER: ${SSH_RUNTIME_USER:-trap}
    ports:
      - "${SSH_PUBLIC_PORT:-2222}:22"
    volumes:
      - ssh_logs:/var/log/ssh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  ftp:
    profiles:
      - ftp
    build:
      context: .
      dockerfile: build/ftp/Dockerfile
    environment:
      HACKTRAP_USER: ${FTP_RUNTIME_USER:-trap}
    ports:
      - "${FTP_PUBLIC_PORT:-2121}:21"
    volumes:
      - ftp_logs:/var/log/ftp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x vsftpd >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  openvpn:
    profiles:
      - openvpn
    build:
      context: .
      dockerfile: build/openvpn/Dockerfile
    environment:
      HACKTRAP_USER: ${OPENVPN_RUNTIME_USER:-trap}
    ports:
      - "${OPENVPN_PUBLIC_PORT:-1194}:1194/udp"
    volumes:
      - openvpn_logs:/var/log/openvpn
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ss -lun | grep -q ':1194'"]
      interval: 5s
      timeout: 3s
      retries: 10

  fail2ban:
    build:
      context: .
      dockerfile: build/fail2ban/Dockerfile
    environment:
      FAIL2BAN_SERVICES: ${FAIL2BAN_SERVICES:-ssh}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ssh_logs:/var/log/ssh
      - ftp_logs:/var/log/ftp
      - imap_logs:/var/log/imap
      - smtp_logs:/var/log/smtp
      - openvpn_logs:/var/log/openvpn
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "fail2ban-client ping | grep -q 'Server replied'"]
      interval: 5s
      timeout: 3s
      retries: 10

  attacker:
    build:
      context: .
      dockerfile: build/attacker/Dockerfile
    command: ["sleep", "infinity"]
    profiles:
      - test

  imap:
    profiles:
      - imap
    build:
      context: .
      dockerfile: build/imap/Dockerfile
    environment:
      HACKTRAP_USER: ${IMAP_RUNTIME_USER:-trap}
    ports:
      - "${IMAP_PUBLIC_PORT:-2143}:143"
    volumes:
      - imap_logs:/var/log/imap
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f imap_server.py >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  smtp:
    profiles:
      - smtp
    build:
      context: .
      dockerfile: build/smtp/Dockerfile
    environment:
      HACKTRAP_USER: ${SMTP_RUNTIME_USER:-trap}
    ports:
      - "${SMTP_PUBLIC_PORT:-2525}:25"
    volumes:
      - smtp_logs:/var/log/smtp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f smtp_server.py >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ssh_logs:
  ftp_logs:
  imap_logs:
  smtp_logs:
  openvpn_logs:
