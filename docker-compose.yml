name: hacktrapagent

services:
  asterisk:
    profiles:
      - asterisk
    build:
      context: .
      dockerfile: build/asterisk/Dockerfile
    environment:
      HACKTRAP_USER: ${ASTERISK_RUNTIME_USER:-trap}
    ports:
      - "${ASTERISK_PJSIP_PUBLIC_PORT:-5060}:5060/tcp"
      - "${ASTERISK_PJSIP_PUBLIC_PORT:-5060}:5060/udp"
      - "${ASTERISK_IAX_PUBLIC_PORT:-4569}:4569/udp"
      - "${ASTERISK_MANAGER_PUBLIC_PORT:-5038}:5038"
      - "${ASTERISK_ARI_PUBLIC_PORT:-8088}:8088"
    volumes:
      - asterisk_logs:/var/log/asterisk
    restart: unless-stopped

  ssh:
    profiles:
      - ssh
    build:
      context: .
      dockerfile: build/ssh/Dockerfile
    environment:
      HACKTRAP_USER: ${SSH_RUNTIME_USER:-trap}
    ports:
      - "${SSH_PUBLIC_PORT:-2222}:22"
    volumes:
      - ssh_logs:/var/log/ssh
    restart: unless-stopped

  telnetd:
    profiles:
      - telnetd
    build:
      context: .
      dockerfile: build/telnetd/Dockerfile
    environment:
      HACKTRAP_USER: ${TELNETD_RUNTIME_USER:-trap}
    ports:
      - "${TELNETD_PUBLIC_PORT:-2323}:23"
    volumes:
      - telnetd_logs:/var/log/telnet
    restart: unless-stopped

  ftp:
    profiles:
      - ftp
    build:
      context: .
      dockerfile: build/ftp/Dockerfile
    environment:
      HACKTRAP_USER: ${FTP_RUNTIME_USER:-trap}
    ports:
      - "${FTP_PUBLIC_PORT:-2121}:21"
    volumes:
      - ftp_logs:/var/log/ftp
    restart: unless-stopped

  tftp:
    profiles:
      - tftp
    build:
      context: .
      dockerfile: build/tftp/Dockerfile
    ports:
      - "${TFTP_PUBLIC_PORT:-2069}:69/udp"
    volumes:
      - tftp_logs:/var/log/tftp
    restart: unless-stopped

  ntp:
    profiles:
      - ntp
    build:
      context: .
      dockerfile: build/ntp/Dockerfile
    environment:
      NTP_LOG_FILE: /var/log/ntp/ntp.log
      NTP_DEBUG_LEVEL: 3
    ports:
      - "${NTP_PUBLIC_PORT:-2123}:123/udp"
    volumes:
      - ntp_logs:/var/log/ntp
    restart: unless-stopped

  nfs:
    profiles:
      - nfs
    build:
      context: .
      dockerfile: build/nfs/Dockerfile
    environment:
      NFS_ALLOWED_CLIENTS: ${NFS_ALLOWED_CLIENTS:-127.0.0.1/32}
      NFS_LOG_LEVEL: ${NFS_LOG_LEVEL:-DEBUG}
    ports:
      - "${NFS_PUBLIC_PORT:-2049}:2049"
    volumes:
      - nfs_logs:/var/log/nfs
    restart: unless-stopped

  l2tp:
    profiles:
      - l2tp
    build:
      context: .
      dockerfile: build/l2tp/Dockerfile
    environment:
      HACKTRAP_USER: ${L2TP_RUNTIME_USER:-trap}
    ports:
      - "${L2TP_PUBLIC_PORT:-11701}:1701/udp"
      - "${L2TP_IKE_PUBLIC_PORT:-15100}:500/udp"
      - "${L2TP_NATT_PUBLIC_PORT:-14501}:4500/udp"
    cap_add:
      - NET_ADMIN
    volumes:
      - l2tp_logs:/var/log/l2tp
    restart: unless-stopped

  postgresql:
    profiles:
      - postgresql
    build:
      context: .
      dockerfile: build/postgresql/Dockerfile
    environment:
      HACKTRAP_USER: ${POSTGRESQL_RUNTIME_USER:-trap}
    ports:
      - "${POSTGRESQL_PUBLIC_PORT:-5432}:5432"
    volumes:
      - postgresql_logs:/var/log/postgresql
    restart: unless-stopped

  ike2:
    profiles:
      - ike2
    build:
      context: .
      dockerfile: build/ike2/Dockerfile
    environment:
      HACKTRAP_USER: ${IKE2_RUNTIME_USER:-trap}
    ports:
      - "${IKE2_PUBLIC_PORT:-1500}:500/udp"
      - "${IKE2_NATT_PUBLIC_PORT:-14500}:4500/udp"
    cap_add:
      - NET_ADMIN
    volumes:
      - ike2_logs:/var/log/ike2
    restart: unless-stopped

  mysql:
    profiles:
      - mysql
    build:
      context: .
      dockerfile: build/mysql/Dockerfile
    environment:
      HACKTRAP_USER: ${MYSQL_RUNTIME_USER:-trap}
    ports:
      - "${MYSQL_PUBLIC_PORT:-3306}:3306"
    volumes:
      - mysql_logs:/var/log/mysql
    restart: unless-stopped

  memcached:
    profiles:
      - memcached
    build:
      context: .
      dockerfile: build/memcached/Dockerfile
    environment:
      HACKTRAP_USER: ${MEMCACHED_RUNTIME_USER:-trap}
    ports:
      - "${MEMCACHED_PUBLIC_PORT:-2112}:11211"
    volumes:
      - memcached_logs:/var/log/memcached
    restart: unless-stopped

  mongodb:
    profiles:
      - mongodb
    build:
      context: .
      dockerfile: build/mongodb/Dockerfile
    environment:
      HACKTRAP_USER: ${MONGODB_RUNTIME_USER:-trap}
    ports:
      - "${MONGODB_PUBLIC_PORT:-27017}:27017"
    volumes:
      - mongodb_logs:/var/log/mongodb
    restart: unless-stopped

  redis:
    profiles:
      - redis
    build:
      context: .
      dockerfile: build/redis/Dockerfile
    environment:
      HACKTRAP_USER: ${REDIS_RUNTIME_USER:-trap}
    ports:
      - "${REDIS_PUBLIC_PORT:-6379}:6379"
    volumes:
      - redis_logs:/var/log/redis
    restart: unless-stopped

  elasticsearch:
    profiles:
      - elasticsearch
    build:
      context: .
      dockerfile: build/elasticsearch/Dockerfile
    environment:
      HACKTRAP_USER: ${ELASTICSEARCH_RUNTIME_USER:-trap}
    ports:
      - "${ELASTICSEARCH_PUBLIC_PORT:-9200}:9200"
    volumes:
      - elasticsearch_logs:/var/log/elasticsearch
    restart: unless-stopped

  clickhouse:
    profiles:
      - clickhouse
    build:
      context: .
      dockerfile: build/clickhouse/Dockerfile
    environment:
      HACKTRAP_USER: ${CLICKHOUSE_RUNTIME_USER:-trap}
    ports:
      - "${CLICKHOUSE_HTTP_PUBLIC_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PUBLIC_PORT:-9000}:9000"
    volumes:
      - clickhouse_logs:/var/log/clickhouse-server
    restart: unless-stopped

  bgp:
    profiles:
      - bgp
    build:
      context: .
      dockerfile: build/bgp/Dockerfile
    environment:
      BGP_ALLOWED_PEERS: ${BGP_ALLOWED_PEERS:-}
      BGP_LOCAL_ASN: ${BGP_LOCAL_ASN:-65000}
      BGP_PEER_ASN: ${BGP_PEER_ASN:-65001}
      BGP_ROUTER_ID: ${BGP_ROUTER_ID:-198.51.100.1}
    ports:
      - "${BGP_PUBLIC_PORT:-2179}:179"
    volumes:
      - bgp_logs:/var/log/bgp
    restart: unless-stopped

  openvpn:
    profiles:
      - openvpn
    build:
      context: .
      dockerfile: build/openvpn/Dockerfile
    environment:
      HACKTRAP_USER: ${OPENVPN_RUNTIME_USER:-trap}
    ports:
      - "${OPENVPN_PUBLIC_PORT:-1194}:1194/udp"
    volumes:
      - openvpn_logs:/var/log/openvpn
    restart: unless-stopped

  smb:
    profiles:
      - smb
    build:
      context: .
      dockerfile: build/smb/Dockerfile
    environment:
      HACKTRAP_USER: ${SMB_RUNTIME_USER:-trap}
    ports:
      - "${SMB_PUBLIC_PORT:-2445}:445"
    volumes:
      - smb_logs:/var/log/smb
    restart: unless-stopped

  kafka:
    profiles:
      - kafka
    build:
      context: .
      dockerfile: build/kafka/Dockerfile
    environment:
      HACKTRAP_USER: ${KAFKA_RUNTIME_USER:-trap}
    ports:
      - "${KAFKA_PUBLIC_PORT:-29092}:9092"
    volumes:
      - kafka_logs:/var/log/kafka
    restart: unless-stopped

  snmp:
    profiles:
      - snmp
    build:
      context: .
      dockerfile: build/snmp/Dockerfile
    environment:
      HACKTRAP_USER: ${SNMP_RUNTIME_USER:-trap}
    ports:
      - "${SNMP_PUBLIC_PORT:-2161}:161/udp"
    volumes:
      - snmp_logs:/var/log/snmp
    restart: unless-stopped

  rdp:
    profiles:
      - rdp
    build:
      context: .
      dockerfile: build/rdp/Dockerfile
    environment:
      HACKTRAP_USER: ${RDP_RUNTIME_USER:-trap}
    ports:
      - "${RDP_PUBLIC_PORT:-3389}:3389"
    volumes:
      - rdp_logs:/var/log/rdp
    restart: unless-stopped

  snmptrap:
    profiles:
      - snmptrap
    build:
      context: .
      dockerfile: build/snmptrap/Dockerfile
    environment:
      HACKTRAP_USER: ${SNMPTRAP_RUNTIME_USER:-trap}
    ports:
      - "${SNMPTRAP_PUBLIC_PORT:-2162}:162/udp"
    volumes:
      - snmptrap_logs:/var/log/snmptrap
    restart: unless-stopped

  rabbitmq:
    profiles:
      - rabbitmq
    build:
      context: .
      dockerfile: build/rabbitmq/Dockerfile
    environment:
      HACKTRAP_USER: ${RABBITMQ_RUNTIME_USER:-trap}
      RABBITMQ_LOGS: /var/log/rabbitmq/rabbit.log
      RABBITMQ_ENABLE_MANAGEMENT: ${RABBITMQ_ENABLE_MANAGEMENT:-false}
      RABBITMQ_UNSAFE_RAM_STORAGE: ${RABBITMQ_UNSAFE_RAM_STORAGE:-true}
      RABBITMQ_LOW_CPU_ERL_ARGS: "${RABBITMQ_LOW_CPU_ERL_ARGS:-+S 1:1 +A 2 +sbwt none +sbwtdcpu none +sbwtdio none}"
    ports:
      - "${RABBITMQ_PUBLIC_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PUBLIC_PORT:-15672}:15672"
    volumes:
      - rabbitmq_logs:/var/log/rabbitmq
    restart: unless-stopped

  radius:
    profiles:
      - radius
    build:
      context: .
      dockerfile: build/radius/Dockerfile
    environment:
      HACKTRAP_USER: ${RADIUS_RUNTIME_USER:-trap}
    ports:
      - "${RADIUS_PUBLIC_PORT:-1812}:1812/udp"
    volumes:
      - radius_logs:/var/log/radius
    restart: unless-stopped

  ad:
    profiles:
      - ad
    build:
      context: .
      dockerfile: build/ad/Dockerfile
    environment:
      HACKTRAP_USER: ${AD_RUNTIME_USER:-trap}
    ports:
      - "${AD_PUBLIC_PORT:-2389}:389"
    volumes:
      - ad_logs:/var/log/ad
    restart: unless-stopped

  fail2ban:
    build:
      context: .
      dockerfile: build/fail2ban/Dockerfile
    environment:
      FAIL2BAN_SERVICES: ${FAIL2BAN_SERVICES:-asterisk,ssh,telnetd,ftp,tftp,ntp,nfs,postgresql,mysql,memcached,mongodb,redis,bgp,openvpn,smb,kafka,l2tp,ike2,imap,pop3,smtp,elasticsearch,clickhouse,ad,radius,rabbitmq,rdp,snmp,snmptrap}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - asterisk_logs:/var/log/asterisk
      - ssh_logs:/var/log/ssh
      - telnetd_logs:/var/log/telnet
      - ftp_logs:/var/log/ftp
      - tftp_logs:/var/log/tftp
      - ntp_logs:/var/log/ntp
      - nfs_logs:/var/log/nfs
      - imap_logs:/var/log/imap
      - pop3_logs:/var/log/pop3
      - smtp_logs:/var/log/smtp
      - l2tp_logs:/var/log/l2tp
      - ike2_logs:/var/log/ike2
      - postgresql_logs:/var/log/postgresql
      - mysql_logs:/var/log/mysql
      - memcached_logs:/var/log/memcached
      - mongodb_logs:/var/log/mongodb
      - redis_logs:/var/log/redis
      - elasticsearch_logs:/var/log/elasticsearch
      - clickhouse_logs:/var/log/clickhouse-server
      - bgp_logs:/var/log/bgp
      - openvpn_logs:/var/log/openvpn
      - smb_logs:/var/log/smb
      - kafka_logs:/var/log/kafka
      - snmp_logs:/var/log/snmp
      - snmptrap_logs:/var/log/snmptrap
      - rdp_logs:/var/log/rdp
      - rabbitmq_logs:/var/log/rabbitmq
      - radius_logs:/var/log/radius
      - ad_logs:/var/log/ad
    restart: unless-stopped

  attacker:
    build:
      context: .
      dockerfile: build/attacker/Dockerfile
    command: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
    profiles:
      - test

  imap:
    profiles:
      - imap
    build:
      context: .
      dockerfile: build/imap/Dockerfile
    environment:
      HACKTRAP_USER: ${IMAP_RUNTIME_USER:-trap}
    ports:
      - "${IMAP_PUBLIC_PORT:-2143}:143"
    volumes:
      - imap_logs:/var/log/imap
    restart: unless-stopped

  pop3:
    profiles:
      - pop3
    build:
      context: .
      dockerfile: build/pop3/Dockerfile
    environment:
      HACKTRAP_USER: ${POP3_RUNTIME_USER:-trap}
    ports:
      - "${POP3_PUBLIC_PORT:-2110}:110"
    volumes:
      - pop3_logs:/var/log/pop3
    restart: unless-stopped

  smtp:
    profiles:
      - smtp
    build:
      context: .
      dockerfile: build/smtp/Dockerfile
    environment:
      HACKTRAP_USER: ${SMTP_RUNTIME_USER:-trap}
    ports:
      - "${SMTP_PUBLIC_PORT:-2525}:25"
    volumes:
      - smtp_logs:/var/log/smtp
    restart: unless-stopped

volumes:
  asterisk_logs:
  ssh_logs:
  telnetd_logs:
  ftp_logs:
  tftp_logs:
  ntp_logs:
  nfs_logs:
  imap_logs:
  pop3_logs:
  smtp_logs:
  l2tp_logs:
  ike2_logs:
  postgresql_logs:
  mysql_logs:
  memcached_logs:
  mongodb_logs:
  redis_logs:
  elasticsearch_logs:
  clickhouse_logs:
  bgp_logs:
  openvpn_logs:
  smb_logs:
  kafka_logs:
  snmp_logs:
  snmptrap_logs:
  rdp_logs:
  rabbitmq_logs:
  radius_logs:
  ad_logs:
