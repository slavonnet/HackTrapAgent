name: fail2ban integration tests

on:
  pull_request:
  push:
    branches:
      - main
      - "cursor/**"

jobs:
  service-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ssh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run service integration test
        run: |
          chmod +x tests/run_service_tests.sh tests/${{ matrix.service }}/test_fail2ban_scope.sh
          ./tests/run_service_tests.sh "${{ matrix.service }}"
